<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskApp</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #00e5a0;
    --text: #e8e8e8;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 40px 24px;
  }

  header {
    max-width: 640px;
    margin: 0 auto 40px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .container { max-width: 640px; margin: 0 auto; }

  .form-row {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  button {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 0.8rem;
    padding: 10px 18px;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.5px;
  }

  button:hover { opacity: 0.85; }
  button.danger { background: #ff4d4d; color: #fff; }

  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }

  .task:hover { border-color: #3e3e3e; }
  .task.done .task-title { text-decoration: line-through; color: var(--muted); }

  .task-check {
    width: 18px; height: 18px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .task-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .task-check.checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #000;
    font-weight: 700;
  }

  .task-title { flex: 1; font-size: 0.9rem; }

  .task-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .del-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid transparent;
    font-size: 1rem;
    padding: 2px 8px;
    line-height: 1;
  }

  .del-btn:hover { color: #ff4d4d; border-color: #ff4d4d; background: transparent; opacity: 1; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    padding: 40px;
    border: 1px dashed var(--border);
  }
</style>
</head>
<body>
<header>
  <h1>// taskapp</h1>
  <span>REST-powered task manager</span>
</header>

<div class="container">
  <div class="form-row">
    <input id="newTitle" type="text" placeholder="new task..." />
    <button onclick="addTask()">ADD</button>
  </div>
  <div id="taskList" class="task-list"></div>
</div>

<script>
  async function load() {
    const res = await fetch('/api/tasks');
    const tasks = await res.json();
    render(tasks);
  }

  function render(tasks) {
    const el = document.getElementById('taskList');
    if (!tasks.length) {
      el.innerHTML = '<div class="empty">no tasks yet</div>';
      return;
    }
    el.innerHTML = tasks.map(t => `
      <div class="task ${t.done ? 'done' : ''}" id="task-${t.id}">
        <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggle(${t.id}, ${!t.done})"></div>
        <span class="task-title">${esc(t.title)}</span>
        <span class="task-id">#${t.id}</span>
        <button class="del-btn" onclick="del(${t.id})">×</button>
      </div>
    `).join('');
  }

  async function addTask() {
    const input = document.getElementById('newTitle');
    const title = input.value.trim();
    if (!title) return;
    await fetch('/api/tasks', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({title})
    });
    input.value = '';
    load();
  }

  async function toggle(id, done) {
    await fetch(`/api/tasks/${id}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({done})
    });
    load();
  }

  async function del(id) {
    await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    load();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('newTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  load();
</script>
</body>
</html>
